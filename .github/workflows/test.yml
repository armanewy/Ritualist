name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check source line endings and Git blobs
        run: python scripts/check_line_endings.py --check-git-head --check-git-index

      - name: Run tests
        run: python -m pytest -q

  windows-optional-deps-smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install all optional dependencies
        run: python -m pip install -e ".[all,dev]"

      - name: Smoke CLI help
        run: |
          python -m setpiece --help
          python -m setpiece doctor --help
          python -m setpiece home --help
          python -m setpiece inspect-window --help
          python -m setpiece pack --help

  optional-deps-gui-home:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONFAULTHANDLER: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install all optional dependencies
        run: python -m pip install -e ".[all,dev]"

      - name: Run optional dependency tests
        run: python -m pytest -q

      - name: Compile package and tests
        run: python -m compileall -q setpiece tests

      - name: Smoke CLI and Home commands
        run: |
          python -m setpiece --help
          python -m setpiece home --help
          python -m setpiece pack --help
          python -m setpiece perf home-model --mock-cards 100 --json
          python -m setpiece perf home-model --mock-cards 300 --json
          python -m setpiece perf fake-run setpiece/sample_recipes/gaming_mode.yaml --json
