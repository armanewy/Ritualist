version: "0.1"
id: gaming_mode
name: Gaming Mode
description: Open a looping video, minimize Chrome, launch Battle.net, and ask before Play.
variables:
  youtube_url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
  battle_net_path: 'C:\Program Files (x86)\Battle.net\Battle.net Launcher.exe'
  battle_net_window: Battle.net
environment:
  os:
    - windows
  required_capabilities:
    - playwright
    - windows_uia
    - app_launch
    - browser_control
    - window_management
  expected_windows:
    - title_contains: "{{ battle_net_window }}"
  expected_labels:
    - window_title_contains: "{{ battle_net_window }}"
      text: Play
  variable_hints:
    youtube_url: Set this to the ambience video URL you want to keep open.
    battle_net_path: Set this to your local Battle.net Launcher.exe path.
    battle_net_window: Set this to the visible title text of the Battle.net window.
steps:
  - name: Open ambience video
    action: browser.open
    url: "{{ youtube_url }}"
    browser: chrome
    profile: gaming_mode
    keep_open: true

  - name: Loop and play video
    action: browser.media
    selector: video
    loop: true
    play: true

  - name: Minimize Chrome
    action: window.minimize
    title_contains: YouTube
    optional: true
    timeout_seconds: 5

  - name: Launch Battle.net
    action: app.launch
    command: "{{ battle_net_path }}"

  - name: Wait for Battle.net
    action: window.wait
    title_contains: "{{ battle_net_window }}"
    timeout_seconds: 30

  - name: Select Diablo IV
    action: desktop.click_text
    text: Diablo IV
    window_title_contains: "{{ battle_net_window }}"
    exact: false
    optional: true
    timeout_seconds: 20

  - name: Ask before clicking Play
    action: desktop.click_text
    text: Play
    window_title_contains: "{{ battle_net_window }}"
    requires_confirmation: true
    timeout_seconds: 20
