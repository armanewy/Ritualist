version: "0.1"
id: vpn_repair_placeholder
name: VPN Repair Placeholder
description: Placeholder for approved VPN repair runbooks and client status review. Ritualist opens references and pauses for manual checks; it does not change network or client state.
home:
  category: Support Desk
  card:
    title: VPN Repair
    subtitle: Placeholder runbook + client status
    image: ""
    accent: "#5f8fa3"
variables:
  vpn_runbook_url: "https://support.example.invalid/vpn-runbook"
  vpn_status_url: "https://status.example.invalid/vpn"
  vpn_client_status_url: "https://support.example.invalid/vpn-client-status"
  vpn_client_path: 'C:\Program Files\VendorVPN\VendorVPN.exe'
  vpn_client_window: Vendor VPN
environment:
  required_capabilities:
    - app_launch
    - browser_control
    - playwright
  expected_windows:
    - title_contains: "{{ vpn_client_window }}"
  variable_hints:
    vpn_runbook_url: Set this to the approved VPN repair runbook URL.
    vpn_status_url: Set this to the approved VPN service status URL.
    vpn_client_status_url: Set this to the approved VPN client status or known-issues URL.
    vpn_client_path: Set this to the local VPN client executable path.
    vpn_client_window: Set this to visible VPN client window title text.
steps:
  - name: Confirm VPN repair placeholder
    action: confirm.ask
    prompt: Open approved VPN repair references and the VPN client for manual review only?

  - name: Open VPN repair runbook
    action: browser.open
    url: "{{ vpn_runbook_url }}"
    browser: chrome
    profile: vpn_repair
    keep_open: true

  - name: Open VPN service status
    action: browser.open
    url: "{{ vpn_status_url }}"
    browser: chrome
    profile: vpn_repair
    keep_open: true

  - name: Open VPN client status guide
    action: browser.open
    url: "{{ vpn_client_status_url }}"
    browser: chrome
    profile: vpn_repair
    keep_open: true

  - name: Launch VPN client status surface
    action: app.launch
    command: "{{ vpn_client_path }}"
    optional: true
    requires_confirmation: true

  - name: Complete manual VPN checklist
    action: human.checklist
    prompt: Complete the approved VPN repair placeholder checklist.
    items:
      - Review the approved runbook for the current client and outage state.
      - Compare the VPN service status with the user's reported time and region.
      - Inspect the VPN client status surface without changing profiles or settings.
      - Record the observed client state in the case notes using the approved process.

  - name: Wait for VPN review
    action: wait.for_user
    prompt: Continue after the manual VPN runbook review and client status check are complete.

  - name: Record VPN placeholder note
    action: note.add
    text: VPN repair placeholder completed manual review without changing network or client state.
