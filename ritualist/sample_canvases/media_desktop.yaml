schema: ritualist.canvas.v1
id: media_desktop
name: Media Desktop
description: Media-focused canvas template with display-only components.
mode: desktop_canvas
resolution_policy: responsive
background:
  type: gradient
  value: deep_teal
grid:
  enabled: true
  size: 16
components:
  - id: title
    type: text.label
    x: 72
    y: 56
    width: 420
    height: 72
    z: 1
    props:
      text: Media Desktop
  - id: ambience_card
    type: ritual.card
    x: 72
    y: 160
    width: 480
    height: 240
    z: 10
    props:
      title: Ambience Ritual
      subtitle: Bind this to a local media recipe
      recipe_id: media_mode
    binding:
      kind: recipe
      recipe_id: media_mode
  - id: status
    type: ritual.status
    x: 72
    y: 424
    width: 480
    height: 120
    z: 11
    binding:
      kind: recipe
      recipe_id: media_mode
  - id: clock
    type: clock
    x: 608
    y: 160
    width: 180
    height: 80
    z: 2
    props:
      format: short
