schema: ritualist.canvas.v1
id: focus_room
name: Focus Room
description: Low-distraction Room for a current task, safe previews, and local status.
mode: desktop_canvas
resolution_policy: responsive
theme:
  id: ritualist.paper
  name: Ritualist Paper
background:
  type: solid
  value: "{color.background}"
grid:
  enabled: true
  size: 16
components:
  - id: title
    type: text.label
    x: 72
    y: 56
    width: 420
    height: 64
    z: 1
    props:
      text: Focus Room
      size: 28
  - id: focus_clock
    type: clock
    x: 824
    y: 56
    width: 180
    height: 80
    z: 2
    props:
      format: short
  - id: current_task
    type: text.label
    x: 72
    y: 160
    width: 520
    height: 120
    z: 3
    props:
      text: "Current task: choose one next action"
      size: 22
  - id: focus_timer_placeholder
    type: text.label
    x: 624
    y: 160
    width: 380
    height: 120
    z: 4
    props:
      text: Focus timer placeholder
      size: 20
  - id: workspace_preview
    type: ritual.card
    x: 72
    y: 328
    width: 300
    height: 180
    z: 10
    props:
      title: Prepare Focus
      subtitle: Preview a basic workspace plan
      primary_action: preview_plan
    binding:
      kind: intent
      intent_id: workspace.prepare:basic
  - id: diagnostics_preview
    type: ritual.card
    x: 400
    y: 328
    width: 300
    height: 180
    z: 11
    props:
      title: Check Environment
      subtitle: Preview minimal diagnostics
      primary_action: preview_plan
    binding:
      kind: intent
      intent_id: diagnostics.collect:minimal
  - id: recent_activity
    type: recent.activity
    x: 728
    y: 328
    width: 360
    height: 184
    z: 12
    props:
      title: Recent activity
      limit: 5
    binding:
      kind: recent_runs
      id: local
