schema: setpiece.canvas.v1
id: helpdesk_desktop
name: Support Desk
description: Support Desk Room for local runbooks, diagnostics, status, and evidence logs.
mode: desktop_canvas
resolution_policy: responsive
theme:
  id: setpiece.paper
  name: Setpiece Paper
background:
  type: solid
  value: "{color.background}"
grid:
  enabled: true
  size: 16
components:
  - id: title
    type: text.label
    x: 48
    y: 32
    width: 420
    height: 56
    z: 1
    props:
      text: Support Desk
      size: 30
  - id: subtitle
    type: text.label
    x: 48
    y: 88
    width: 664
    height: 44
    z: 1
    props:
      text: Triage, diagnostics, audio, VPN, and onboarding runbooks with local logs.
      size: 14
  - id: doctor_badge
    type: doctor.badge
    x: 48
    y: 548
    width: 180
    height: 144
    z: 3
    props:
      title: Doctor
      recipe_id: support_triage_workspace
    binding:
      kind: recipe
      recipe_id: support_triage_workspace
  - id: support_triage_card
    type: ritual.card
    x: 48
    y: 144
    width: 520
    height: 200
    z: 10
    props:
      title: Support Triage
      subtitle: Queue + KB + status + notes
      recipe_id: support_triage_workspace
      primary_action: run
      accent: "#3d8b6f"
    binding:
      kind: recipe
      recipe_id: support_triage_workspace
  - id: diagnostics_card
    type: ritual.card
    x: 600
    y: 144
    width: 360
    height: 172
    z: 10
    props:
      title: Collect Basic Diagnostics
      subtitle: System info + status + notes
      recipe_id: collect_basic_diagnostics
      primary_action: run
      accent: "#5c7a32"
    binding:
      kind: recipe
      recipe_id: collect_basic_diagnostics
  - id: meeting_audio_card
    type: ritual.card
    x: 600
    y: 332
    width: 360
    height: 172
    z: 10
    props:
      title: Meeting Audio Troubleshooting
      subtitle: Checklist + status + meeting app
      recipe_id: meeting_audio_troubleshooting
      primary_action: run
      accent: "#6f7bd9"
    binding:
      kind: recipe
      recipe_id: meeting_audio_troubleshooting
  - id: vpn_repair_card
    type: ritual.card
    x: 48
    y: 360
    width: 248
    height: 172
    z: 10
    props:
      title: VPN Repair
      subtitle: Placeholder runbook + client status
      recipe_id: vpn_repair_placeholder
      primary_action: run
      accent: "#5f8fa3"
    binding:
      kind: recipe
      recipe_id: vpn_repair_placeholder
  - id: new_hire_setup_card
    type: ritual.card
    x: 320
    y: 360
    width: 248
    height: 172
    z: 10
    props:
      title: New Hire Setup
      subtitle: Draft checklist + approved portals + local notes
      recipe_id: new_hire_setup_draft
      primary_action: run
      accent: "#8b7a42"
    binding:
      kind: recipe
      recipe_id: new_hire_setup_draft
  - id: run_status
    type: ritual.status
    x: 248
    y: 548
    width: 260
    height: 144
    z: 11
    props:
      title: Current Ritual
      recipe_id: support_triage_workspace
    binding:
      kind: recipe
      recipe_id: support_triage_workspace
  - id: run_controller
    type: ritual.controller
    x: 528
    y: 548
    width: 432
    height: 144
    z: 12
    props:
      recipe_id: support_triage_workspace
      controls:
        - pause
        - resume
        - stop
        - open_run_log
    binding:
      kind: runtime_state
      id: support_triage_workspace
  - id: recent_runs
    type: recent.activity
    x: 48
    y: 700
    width: 520
    height: 120
    z: 11
    props:
      title: Runbook Ledger / Open Logs
      limit: 2
    binding:
      kind: recent_runs
      id: local
  - id: evidence_note
    type: text.label
    x: 600
    y: 700
    width: 360
    height: 72
    z: 1
    props:
      text: Open Logs / Evidence uses run logs and operator notes only.
      size: 14
